  function buildHotspots(ctx){
    elHotspotLayer.innerHTML = "";
    elPortalPinLayer.innerHTML = ""; // 传送门常驻徽章单独一层，见 buildHotspots 内 isPortal 分支
    var s = slides[current];
    // 面积优先点击判定（2026-07-19 任务书§E）：同一点被多个热区矩形同时覆盖时，
    // 面积最小的那个应该判定优先——它是画面里最具体的物件，不该被随手扣住它的大框（房间/传送门）抢走点击。
    // 做法：按 wd*ht 面积从大到小排出层级，面积越小 --hz 越大，天然叠在最上层；
    // 原生 DOM click 只会落在"当前像素下最上层的元素"上，于是无需另写坐标命中测试，交给浏览器自己算。
    // 非重叠区域不受影响：那里从头到尾只有一个热区的框覆盖那个像素，z-index 高低无关痛痒——大框在空白处照样兜底可点。
    var areaOrder = ctx.hotspots.map(function(h, i){
      return { i: i, area: Math.max(0, Number(h.wd) || 0) * Math.max(0, Number(h.ht) || 0) };
    });
    areaOrder.sort(function(a, b){ return b.area - a.area; }); // 大→小：大框先分到低层级
    var hzRank = {};
    areaOrder.forEach(function(o, rank){ hzRank[o.i] = Math.min(rank + 1, 30); }); // 面积最小者拿到最大层级（最上层）；封顶 30，让给 hover/label-front 的 z-index:40
    ctx.hotspots.forEach(function(h, idx){
      var isEntry = (h.panel !== undefined);
      var isPortal = (h.portal !== undefined);
      var word = null, entryPanel = null, portalIdx = -1;
      if(isEntry){
        entryPanel = findPanel(s, h.panel);
        if(!entryPanel) return;
      } else if(isPortal){
        portalIdx = findPortalTarget(h);
        if(portalIdx < 0) return;
      } else {
        word = ctx.words[h.w];
        if(!word) return;
      }

      var hotspot = document.createElement("div");
      hotspot.className = isEntry ? "hotspot hotspot-entry"
        : isPortal ? "hotspot hotspot-entry hotspot-portal" : "hotspot";
      hotspot.style.left = h.x + "%";
      hotspot.style.top = h.y + "%";
      hotspot.style.width = h.wd + "%";
      hotspot.style.height = h.ht + "%";
      hotspot.style.setProperty("--hz", String(hzRank[idx]));
      hotspot.tabIndex = 0;
      hotspot.setAttribute("role", "button");

      if(isEntry){
        var entryPanelName = entryPanel.names[nativeLang];
        hotspot.setAttribute("aria-label", t("ariaOpenPanel") + " " + entryPanelName);
        var hint = document.createElement("div");
        hint.className = "hotspot-label entry-hint";
        var hintText = document.createElement("span");
        hintText.className = "en";
        hintText.textContent = t("ariaOpenPanel") + " " + entryPanelName + " " + t("openPanelSuffix");
        hint.appendChild(hintText);
        hotspot.appendChild(hint);
      } else if(isPortal){
        var pTarget = slides[portalIdx];
        var pTargetName = pTarget.sceneNames[nativeLang];
        hotspot.setAttribute("aria-label", t("ariaGoTo") + " " + pTargetName);
        // 常驻地标：跟 buildMapHotspots() 的地图坐标点用完全一样的 DOM 结构/class
        // （.map-pin > .map-pin-dot + .map-pin-label），视觉上跟地图 pin 一模一样，
        // 锚在热区几何中心（跟地图上"一栋建筑=一个点"的手感一致）。
        // 挂在独立的 #portalPinLayer（跟 #hotspotLayer 同容器、同坐标系，inset:0 共享
        // 百分比坐标），不塞进 .hotspot-portal 内部——否则会被面积优先排出的低 --hz
        // 压到 .stage-banner 场景横幅底下（近顶部的门实测会被横幅盖住）。
        // 徽章自带独立 click（复用 handleHotspotClick，跟真热区完全同一套逻辑/守卫）：
        // 实测踩过坑——若徽章只是纯装饰（pointer-events:none 穿透），商场中庭"服装店"
        // 门的徽章几何中心恰好跟它内部"information desk"词标签常驻显示的那张纸签重叠，
        // 穿透点击落到的其实是词标签，传送门反而点不动。给徽章自己接一个 click，不管
        // 底下叠着什么都保证点得到；键盘/读屏走的还是原热区本身（tabIndex/aria-label
        // 都在 .hotspot-portal 上，没变），徽章只是给鼠标/触屏加一个更好点的可视目标。
        var pPin = document.createElement("div");
        pPin.className = "map-pin";
        pPin.setAttribute("aria-hidden", "true");
        pPin.style.left = (h.x + h.wd / 2) + "%";
        pPin.style.top = (h.y + h.ht / 2) + "%";
        pPin.addEventListener("click", function(){ handleHotspotClick(idx, hotspot); });
        var pDot = document.createElement("span");
        pDot.className = "map-pin-dot";
        pPin.appendChild(pDot);
        var pLabel = document.createElement("span");
        pLabel.className = "map-pin-label";
        pLabel.textContent = pTargetName;
        pPin.appendChild(pLabel);
        elPortalPinLayer.appendChild(pPin);
      } else {
        // .en span = 学习语言词（图上标签），.zh span = 母语词；退化格（学习=母语）只显一个不重复
        var learnTerm = wordTerm(word, learnLang);
        var nativeTerm = wordTerm(word, nativeLang);
        hotspot.setAttribute("aria-label", learnTerm + " / " + nativeTerm);
        if(isKnown(ctx.key, word.terms.en)){ hotspot.classList.add("known"); }

        var label = document.createElement("div");
        label.className = "hotspot-label";
        var enSpan = document.createElement("span");
        enSpan.className = "en";
        enSpan.textContent = learnTerm;
        var zhSpan = document.createElement("span");
        zhSpan.className = "zh";
        zhSpan.textContent = nativeTerm;
        label.appendChild(enSpan);
        label.appendChild(zhSpan);
        hotspot.appendChild(label);
      }

      hotspot.addEventListener("click", function(){ handleHotspotClick(idx, hotspot); });
      hotspot.addEventListener("keydown", function(e){
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          handleHotspotClick(idx, hotspot);
        }
      });

      elHotspotLayer.appendChild(hotspot);
    });
    buildDialogues(ctx);
    applyLabelMode();
  }

  // ---------------------------------------------------------------
  // 探索模式：会说话气泡（dialogue）——与 hotspots 平级的可选 ctx.dialogues，
  // 渲染在 #hotspotLayer 内（同容器/同坐标系，随 buildHotspots 重建，故切场景/切语言天然刷新）。
  // 每条 dialogue 结构同「词」：{ x,y,wd,ht, terms:{en,zh,es}, reading:{en,zh,es} }，
  // 因此可直接复用 wordTerm/wordReading/speak（slug=slugify(terms.en) 整句，与发音 pipeline 一致）。
  // ---------------------------------------------------------------
  var dialoguePopEl = null; // 当前打开的对话浮层（单例）

  function closeDialoguePopover(){
    if(dialoguePopEl && dialoguePopEl.parentNode){ dialoguePopEl.parentNode.removeChild(dialoguePopEl); }
    dialoguePopEl = null;
  }

  function buildDialogues(ctx){
    closeDialoguePopover(); // 重建热区层前先收掉旧浮层（innerHTML 清空其实已经摘除，这里只复位引用）
    (ctx.dialogues || []).forEach(function(d){
      var dh = document.createElement("div");
      dh.className = "dialogue-hotspot";
      dh.style.left = d.x + "%";
      dh.style.top = d.y + "%";
      dh.style.width = d.wd + "%";
      dh.style.height = d.ht + "%";
      dh.tabIndex = 0;
      dh.setAttribute("role", "button");
      var dName = wordTerm(d, learnLang) || wordTerm(d, nativeLang);
      dh.setAttribute("aria-label", t("dlgAria") + "：" + dName);
      var marker = document.createElement("div");
      marker.className = "dialogue-marker";
      marker.textContent = "💬";
      dh.appendChild(marker);
      dh.addEventListener("click", function(e){ e.stopPropagation(); openDialoguePopover(d, dh); });
      dh.addEventListener("keydown", function(e){
        if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openDialoguePopover(d, dh); }
      });
      elHotspotLayer.appendChild(dh);
    });
  }

  // 浮层内容按当前 learnLang/nativeLang 解析（照词卡那套：learnLang 当主句、nativeLang 作译文），
  // 绝不写死语言；切母语/学习语言会经 render()→buildHotspots 重建，天然跟随
  function openDialoguePopover(d, anchorEl){
    var reopen = !!(dialoguePopEl && dialoguePopEl.__dlg === d);
    closeDialoguePopover();
    if(reopen) return; // 再点同一个 = 收起（toggle）

    var degenerate = (learnLang === nativeLang);
    var pop = document.createElement("div");
    pop.className = "dialogue-pop tail-down";
    pop.__dlg = d;

    var line = document.createElement("div");
    line.className = "dlg-line";
    line.textContent = wordTerm(d, learnLang);
    pop.appendChild(line);

    var ipaText = wordReading(d, learnLang);
    if(ipaText){
      var ipa = document.createElement("div");
      ipa.className = "dlg-ipa";
      ipa.textContent = ipaText;
      pop.appendChild(ipa);
    }
    if(!degenerate){
      var tr = document.createElement("div");
      tr.className = "dlg-tr";
      tr.textContent = wordTerm(d, nativeLang);
      pop.appendChild(tr);
    }

    var play = document.createElement("button");
    play.type = "button";
    play.className = "dlg-play";
    play.textContent = "🔊 " + t("dlgPlay");
    play.addEventListener("click", function(e){ e.stopPropagation(); speak(d, null); });
    pop.appendChild(play);

    var tail = document.createElement("span");
    tail.className = "dlg-tail";
    pop.appendChild(tail);

    pop.addEventListener("click", function(e){ e.stopPropagation(); });
    elHotspotLayer.appendChild(pop);
    dialoguePopEl = pop;
    positionDialoguePopover(pop, d);
    speak(d, null); // 打开即播当前语言（与词卡点击即播一致；音频缺失时 speak 自带 Web Speech 兜底）
  }

  // 气泡默认落在 marker 上方（尾巴朝下指向人物）；上方越出舞台图顶就翻到 marker 下方（尾巴朝上）；
  // 水平越界用像素平移钳回图内，同时反向平移尾巴保持指向 marker——逻辑与 layoutLabels 一脉相承
  function positionDialoguePopover(pop, d){
    var cont = elExploreStageInner.getBoundingClientRect();
    if(!cont.width || !cont.height) return;
    var cx = d.x + d.wd / 2; // marker 水平中心（%）
    var PAD = 4;
    pop.classList.add("tail-down");
    pop.classList.remove("tail-up");
    pop.style.left = cx + "%";
    pop.style.top = d.y + "%";
    pop.style.marginLeft = "";
    pop.style.transform = "translate(-50%, calc(-100% - 15px))";
    var r = pop.getBoundingClientRect();
    if(r.top < cont.top + PAD){
      // 上方放不下 → 翻到 marker 下方，尾巴朝上
      pop.classList.remove("tail-down");
      pop.classList.add("tail-up");
      pop.style.top = (d.y + d.ht) + "%";
      pop.style.transform = "translate(-50%, 15px)";
      r = pop.getBoundingClientRect();
    }
    var shift = 0;
    if(r.left < cont.left + PAD){ shift = (cont.left + PAD) - r.left; }
    else if(r.right > cont.right - PAD){ shift = (cont.right - PAD) - r.right; }
    if(shift){
      pop.style.marginLeft = shift + "px";
      var tl = pop.querySelector(".dlg-tail");
      if(tl){ tl.style.marginLeft = (-7.5 - shift) + "px"; } // 尾巴反向平移，仍指向 marker
    }
  }

  // 点浮层/徽章以外的任何地方都收起（徽章与浮层自身的 click 都 stopPropagation，不会误触发这里）
  document.addEventListener("click", function(e){
    if(!dialoguePopEl) return;
    if(dialoguePopEl.contains(e.target)) return;
    if(e.target.closest && e.target.closest(".dialogue-hotspot")) return;
    closeDialoguePopover();
  });

  function updatePanelBackButton(){
    if(activePanel){
      elPanelBack.hidden = false;
      // zh: 「↩ 返回浴室」（无空格贴场景名）；en: 「↩ Back to Bathroom」（前缀含 to，加空格）
      var sep = (nativeLang === "en") ? " " : "";
      elPanelBack.textContent = t("panelBackPrefix") + sep + slides[current].sceneNames[nativeLang];
    } else {
      elPanelBack.hidden = true;
    }
  }

  function renderExplore(){
    cancelQuizSilently();
    resetWordInfoBar();
    var ctx = exploreCtx();
    updatePanelBackButton();
    if(ctx.isPanel && (!ctx.hotspots || !ctx.hotspots.length)){
      showExplorePlaceholder("panel-empty");
      updateQuizButtonVisibility();
      return;
    }
    if(!ctx.stage){
      // 0 热区不算 unavailable——纯导航过场场景（靠 ↑↓/←→/portal 走）合法，
      // 只有真的没有 stage 图才算探索版还没做好
      showExplorePlaceholder("unavailable");
      updateQuizButtonVisibility();
      return;
    }
    var mySlide = slides[current];
    var myPanel = activePanel;
    elExploreImg.alt = ctx.isPanel ? (ctx.name + "（面板舞台图）") : (viewLabel(mySlide) + "（无字舞台图）");
    var targetSrc;
    try{ targetSrc = new URL(ctx.stage, window.location.href).href; }catch(err){ targetSrc = ctx.stage; }
    if(elExploreImg.src === targetSrc && elExploreImg.complete){
      // 同一张图已加载过（如从面板返回主舞台）：src 赋相同值不会再触发 onload，同步处理
      if(elExploreImg.naturalWidth > 0){
        hideExplorePlaceholder();
        buildHotspots(ctx);
      } else {
        showExplorePlaceholder(ctx.isPanel ? "panel-missing" : "missing");
      }
    } else {
      elExploreImg.onload = function(){
        if(slides[current] !== mySlide || activePanel !== myPanel) return; // 已切走，忽略过期回调
        hideExplorePlaceholder();
        buildHotspots(exploreCtx());
      };
      elExploreImg.onerror = function(){
        if(slides[current] !== mySlide || activePanel !== myPanel) return;
        showExplorePlaceholder(myPanel ? "panel-missing" : "missing");
      };
      elExploreImg.src = ctx.stage;
    }
    updateQuizButtonVisibility();
  }

  // ---------------------------------------------------------------
  // 探索模式：子场景面板进出（含 zoom 过渡）
  // ---------------------------------------------------------------
  function stageTransition(outTf, outOrigin, midFn, inTf, inOrigin){
    var inner = elExploreStageInner;
    inner.style.transformOrigin = outOrigin;
    inner.style.transition = "transform 0.26s ease-in, opacity 0.26s ease-in";
    inner.style.transform = outTf;
    inner.style.opacity = "0";
    window.setTimeout(function(){
      midFn();
      inner.style.transition = "none";
      inner.style.transformOrigin = inOrigin;
      inner.style.transform = inTf;
      inner.style.opacity = "0";
      void inner.offsetWidth; // 强制 reflow，让入场动画生效
      inner.style.transition = "transform 0.26s ease-out, opacity 0.26s ease-out";
      inner.style.transform = "scale(1)";
      inner.style.opacity = "1";
      window.setTimeout(function(){
        inner.style.transition = "";
        inner.style.transform = "";
        inner.style.transformOrigin = "";
        inner.style.opacity = "";
      }, 300);
    }, 270);
  }

  function entryZoomParams(h){
    if(!h){ return { origin: "50% 50%", scale: 2.2 }; }
    return {
      origin: (h.x + h.wd/2) + "% " + (h.y + h.ht/2) + "%",
      scale: Math.min(6, Math.max(2, 100 / Math.max(h.wd, h.ht)))
    };
  }

  // ---------------------------------------------------------------
  // 探索模式：场景传送门（点场景内物体跳目标场景，复用 zoom 过渡）
  // ---------------------------------------------------------------
  function findPortalTarget(h){
    for(var i=0;i<slides.length;i++){
      var s = slides[i];
      if(s.sceneId === h.portal && (h.view === undefined || viewKey(s) === h.view)) return i;
    }
    return -1;
  }

  function portalTo(h){
    var target = findPortalTarget(h);
    if(target < 0 || target === current) return;
    var zp = entryZoomParams(h);
    stageTransition(
      "scale(" + zp.scale + ")", zp.origin,
      function(){ goTo(target); },
      "scale(0.88)", "50% 50%"
    );
  }

  // 进入面板的公共逻辑：h 为入口热区时用其坐标算 zoom 起点，h=null 时退化为居中缩放（entryZoomParams 已处理 !h）
  function enterPanelCore(p, h){
    if(!p || activePanel) return;
    resetWordInfoBar();
    panelEntryHotspot = h || null;
    var zp = entryZoomParams(h);
    stageTransition(
      "scale(" + zp.scale + ")", zp.origin,
      function(){
        activePanel = p;
        renderExplore();
        updateFooterText();
        updateArrowTooltips(); // 2026-07-20 面板内隐藏场景方向箭头，只留返回键
      },
      "scale(0.88)", "50% 50%"
    );
  }

  function enterPanel(h){
    var s = slides[current];
    enterPanelCore(findPanel(s, h.panel), h);
  }

  // 目录展开子行直达面板：没有入口热区上下文，按 id 查面板 + 走默认居中缩放
  function enterPanelById(id){
    var s = slides[current];
    enterPanelCore(findPanel(s, id), null);
  }

  function exitPanel(){
    if(!activePanel) return;
    cancelQuizSilently();
    resetWordInfoBar();
    var h = panelEntryHotspot;
    var zp = entryZoomParams(h);
    stageTransition(
      "scale(0.88)", "50% 50%",
      function(){
        activePanel = null;
        panelEntryHotspot = null;
        renderExplore();
        updateFooterText();
        updateArrowTooltips(); // 2026-07-20 退出面板恢复场景方向箭头
      },
      "scale(" + zp.scale + ")", zp.origin
    );
  }

  function exitPanelSilently(){
    activePanel = null;
    panelEntryHotspot = null;
    elPanelBack.hidden = true;
  }

  elPanelBack.addEventListener("click", exitPanel);

  // ---------------------------------------------------------------
  // 探索模式：标签钳制（保证任何热区的标签都完整落在舞台图内）
  // 默认挂热区上方居中；超出图顶→翻到热区下方；下方也放不下→贴热区内部顶端；
  // 左右越界→按像素平移钳回图内。
  // ---------------------------------------------------------------
  function layoutLabels(){
    if(mode !== "explore") return;
    if(elExploreStageInner.hidden) return;
    var cont = elExploreStageInner.getBoundingClientRect();
    if(!cont.width || !cont.height) return;
    var PAD = 2;
    var labels = elHotspotLayer.querySelectorAll(".hotspot-label");
    labels.forEach(function(lb){
      // 词标签在「全部隐藏」态无需钳制；入口提示签（hover 显示）任何态都钳制
      if(!lb.classList.contains("entry-hint") && labelMode === "none") return;
      if(lb.style.display === "none") return;
      // 复位到 CSS 默认位（上方居中）再测量
      lb.style.top = "";
      lb.style.bottom = "";
      lb.style.left = "";
      lb.style.transform = "";
      lb.style.marginTop = "";
      lb.style.marginBottom = "";
      var r = lb.getBoundingClientRect();
      // 垂直钳制
      if(r.top < cont.top + PAD){
        lb.style.bottom = "auto";
        lb.style.top = "100%";
        lb.style.marginBottom = "0";
        lb.style.marginTop = "4px";
        r = lb.getBoundingClientRect();
        if(r.bottom > cont.bottom - PAD){
          lb.style.top = "4px";
          lb.style.marginTop = "0";
          r = lb.getBoundingClientRect();
        }
      }
      // 水平钳制
      var shift = 0;
      if(r.left < cont.left + PAD){ shift = (cont.left + PAD) - r.left; }
      else if(r.right > cont.right - PAD){ shift = (cont.right - PAD) - r.right; }
      if(shift){
        var hsEl = lb.parentElement;
        var hsRect = hsEl.getBoundingClientRect();
        // style.left 相对热区 padding box（border 2px 之内），换算成像素定位
        lb.style.left = ((r.left + shift) - (hsRect.left + hsEl.clientLeft)) + "px";
        lb.style.transform = "none";
      }
    });
  }

  var labelLayoutTimer = null;
  function scheduleLabelLayout(){
    if(mode !== "explore") return;
    window.clearTimeout(labelLayoutTimer);
    labelLayoutTimer = window.setTimeout(layoutLabels, 80);
  }
  window.addEventListener("resize", scheduleLabelLayout);
  if(window.ResizeObserver){
    new ResizeObserver(scheduleLabelLayout).observe(elExploreStageInner);
  }

  // ---------------------------------------------------------------
  // 探索模式：四态标签切换
  // ---------------------------------------------------------------
  function applyLabelMode(){
    var labels = elHotspotLayer.querySelectorAll(".hotspot-label");
    // 退化格（学习语言=母语）：.en/.zh 两 span 内容相同，双显只显一个，不重复
    var degenerate = (learnLang === nativeLang);
    labels.forEach(function(lb){
      if(lb.classList.contains("entry-hint")) return; // 入口提示签只受 hover 控制，不参与四态
      if(labelMode === "none"){ lb.style.display = "none"; return; }
      lb.style.display = "";
      var enEl = lb.querySelector(".en");
      var zhEl = lb.querySelector(".zh");
      if(degenerate){
        enEl.style.display = "";
        zhEl.style.display = "none";
      } else {
        enEl.style.display = (labelMode === "both" || labelMode === "learn") ? "" : "none";
        zhEl.style.display = (labelMode === "both" || labelMode === "native") ? "" : "none";
      }
    });
    layoutLabels();
  }

  function countWordHotspots(ctx){
    var n = 0;
    ctx.hotspots.forEach(function(h){ if(h.panel === undefined && h.portal === undefined) n++; });
    return n;
  }

  function updateQuizButtonVisibility(){
    var ctx = exploreCtx();
    var valid = !!(ctx.stage && countWordHotspots(ctx));
    var show = mode === "explore" && labelMode === "none" && valid && !quiz.active;
    elQuizStart.hidden = !show;
    elMapToggle.hidden = quiz.active; // 地图纸签测验中隐藏，与 quiz.active 联动
    elMapQuickBtn.hidden = quiz.active; // 顶栏地图快速入口同步隐藏
    elPortalPinLayer.classList.toggle("quiz-active", quiz.active); // 传送门常驻徽章找词测验时跟着隐藏，见 CSS .portal-pin-layer.quiz-active
    elHotspotLayer.classList.toggle("quiz-active", quiz.active); // 会说话气泡徽章同步在测验时隐藏，见 CSS .hotspot-layer.quiz-active
    if(quiz.active){ closeDialoguePopover(); } // 进测验先收掉可能开着的对话浮层
    renderStageBanner(); // 测验开/收、面板进出、占位切换都路过这里，横幅状态跟着刷
  }

  elLabelTabs.forEach(function(btn){
    btn.addEventListener("click", function(){
      if(labelMode === btn.getAttribute("data-mode")) return;
      labelMode = btn.getAttribute("data-mode");
      elLabelTabs.forEach(function(b){
        var isActive = (b === btn);
        b.classList.toggle("active", isActive);
        b.setAttribute("aria-checked", isActive ? "true" : "false");
      });
      applyLabelMode();
      if(quiz.active){ cancelQuizSilently(); }
      updateQuizButtonVisibility();
    });
  });
  // 手机端 labelMode 初始值可能被上面的 isMobileDefault 判定改成 "none"，
  // 而 HTML 静态标记的 active 态是「双显」——这里按实际初始 labelMode 同步一次 tab 视觉态，避免"标签显示隐藏、按钮却显示双显"的不一致
  elLabelTabs.forEach(function(b){
    var isActive = (b.getAttribute("data-mode") === labelMode);
    b.classList.toggle("active", isActive);
    b.setAttribute("aria-checked", isActive ? "true" : "false");
  });

  // 朗读语言两态切换：只切 speak() 播放/回落用的语言，不影响标签显示逻辑
  function syncSpeakLangUI(){
    elLangTabs.forEach(function(b){
      var isActive = (b.getAttribute("data-lang") === speakLang);
      b.classList.toggle("active", isActive);
      b.setAttribute("aria-checked", isActive ? "true" : "false");
    });
  }
  syncSpeakLangUI(); // 页面加载时按 localStorage 恢复的 speakLang 同步按钮态
  elLangTabs.forEach(function(btn){
    btn.addEventListener("click", function(){
      var lang = btn.getAttribute("data-lang");
      if(speakLang === lang) return;
      speakLang = lang;
      syncSpeakLangUI();
      saveSpeakLang(speakLang);
    });
  });

  // ---------------------------------------------------------------

  var currentInfoWord = null; // 当前信息条展示的词，供 🔊 重听按钮使用

  // 例句区渲染：学习语言例句里目标词加粗（indexOf 首次匹配；toLowerCase 对中文是无操作，安全通用），
  // DOM 拼接不走 innerHTML；母语例句作译文另起一行，退化格（学习=母语）会与主句重复，不显示
  function renderWibSentence(word){
    while(elWibSenEn.firstChild){ elWibSenEn.removeChild(elWibSenEn.firstChild); }
    var sen = wordSen(word, learnLang);
    var target = wordTerm(word, learnLang);
    var idx = target ? sen.toLowerCase().indexOf(target.toLowerCase()) : -1;
    if(idx >= 0){
      if(idx > 0){ elWibSenEn.appendChild(document.createTextNode(sen.slice(0, idx))); }
      var strong = document.createElement("strong");
      strong.textContent = sen.slice(idx, idx + target.length);
      elWibSenEn.appendChild(strong);
      if(idx + target.length < sen.length){ elWibSenEn.appendChild(document.createTextNode(sen.slice(idx + target.length))); }
    } else {
      elWibSenEn.textContent = sen;
    }
    var degenerate = (learnLang === nativeLang);
    elWibSenZh.textContent = degenerate ? "" : wordSen(word, nativeLang);
  }

  function updateWordInfoBar(word){
    currentInfoWord = word;
    var degenerate = (learnLang === nativeLang);
    elWibEn.textContent = wordTerm(word, learnLang);
    elWibIpa.textContent = wordReading(word, learnLang);
    // 释义 = 母语词形；退化格（学习=母语）与词本身重复，不显示（picture-dictionary 模式）
    elWibZh.textContent = degenerate ? "" : wordTerm(word, nativeLang);
    elWibZh.hidden = degenerate;
    elWibNote.textContent = wordNote(word, nativeLang);
    if(wordSen(word, learnLang)){
      renderWibSentence(word);

    } else {

      elWibSenZh.textContent = "";

  // ---------------------------------------------------------------
  // 探索模式：点击热区（常态 = 更新信息条；测验中 = 判分）
  // ---------------------------------------------------------------
  function handleHotspotClick(idx, hotspotEl){
    var ctx = exploreCtx();
    var h = ctx.hotspots[idx];
    if(!h) return;

    if(h.panel !== undefined){
      if(quiz.active) return; // 测验中不可进入面板
      enterPanel(h);
      return;
    }

    if(h.portal !== undefined){
      if(quiz.active) return; // 测验中不可传送
      portalTo(h);
      return;
    }

    var word = ctx.words[h.w];
    if(!word) return;

    if(quiz.active && quiz.awaitingAnswer){
      if(idx === quiz.currentTargetIdx){
        quiz.score++;
        quiz.awaitingAnswer = false;
        hotspotEl.classList.add("correct");
        window.setTimeout(function(){
          hotspotEl.classList.remove("correct");
          nextQuizRound();
        }, 500);
      } else {
        hotspotEl.classList.add("wrong");
        window.setTimeout(function(){ hotspotEl.classList.remove("wrong"); }, 420);
      }
      return;
    }

    markKnown(ctx.key, word.terms.en);
    hotspotEl.classList.add("known");
    // 分层：把刚点的热区标签浮到最上层且完全不透明（触屏无 hover，靠这个），其余复位
    var layer = hotspotEl.parentNode;
    if(layer){
      var fronts = layer.querySelectorAll(".hotspot.label-front");
      for(var i=0;i<fronts.length;i++){ fronts[i].classList.remove("label-front"); }
    }
    hotspotEl.classList.add("label-front");
    layoutLabels(); // 点谁谁大：激活标签原位放大后，立刻重新钳制防止越界裁切（字号是瞬时切换，测量不会踩过渡中间态）
    updateWordInfoBar(word);
  }

  // ---------------------------------------------------------------
  var quiz = {
    active: false,
    pool: [],
    lastIdx: -1,
    roundIndex: 0,
    total: 20,
    score: 0,
    startTime: 0,
    currentTargetIdx: -1,
    awaitingAnswer: false
  };

  function buildQuizPool(ctx){
    var pool = [];
    ctx.hotspots.forEach(function(h, i){
      if(h.panel === undefined && h.portal === undefined){ pool.push(i); } // 面板入口/传送门热区不参与出题
    });
    return pool;
  }

  function pickNextTargetIndex(){
    var pool = quiz.pool;
    if(pool.length === 0) return -1;
    if(pool.length === 1) return pool[0];
    // 未认识池优先（75%），两池都空不了就照顾复习；guard 防「单元素池 == lastIdx」死循环
    var src = pool;
    if(quiz.poolUnknown && quiz.poolUnknown.length &&
       (!quiz.poolKnown || !quiz.poolKnown.length || Math.random() < 0.75)){
      src = quiz.poolUnknown;
    } else if(quiz.poolKnown && quiz.poolKnown.length){
      src = quiz.poolKnown;
    }
    var idx, guard = 0;
    do{
      idx = src[Math.floor(Math.random() * src.length)];
      if(++guard > 20){
        idx = pool[Math.floor(Math.random() * pool.length)];
        break;
      }
    }while(idx === quiz.lastIdx && (src.length > 1 || pool.length > 1));
    return idx;
  }

  function nextQuizRound(){
    quiz.roundIndex++;
    if(quiz.roundIndex > quiz.total){
      finishQuiz();
      return;
    }
    var ctx = exploreCtx();
    var idx = pickNextTargetIndex();
    quiz.currentTargetIdx = idx;
    quiz.lastIdx = idx;
    quiz.awaitingAnswer = true;
    var h = ctx.hotspots[idx];
    var w = ctx.words[h.w];
    elQuizProgress.textContent = quiz.roundIndex + " / " + quiz.total;
    // 找词测验提示词：显母语词形（用户已知的意思），去图上找对应的学习语言标签物体
    elQuizZh.textContent = wordTerm(w, nativeLang);
    speak(w, null);
  }

  function startQuiz(){
    var ctx = exploreCtx();
    var pool = buildQuizPool(ctx);
    if(!pool.length) return;
    resetWordInfoBar(); // 测验中信息条不更新，开场先清掉上一个词，避免残留
    // 未认识的词优先出题：池按「已认识」切两半，抽题时未认识池 75% 优先
    var known = [], unknown = [];
    pool.forEach(function(i){
      var w = ctx.words[ctx.hotspots[i].w];
      (isKnown(ctx.key, w.terms.en) ? known : unknown).push(i);
    });
    quiz.poolUnknown = unknown;
    quiz.poolKnown = known;
    quiz.active = true;
    quiz.pool = pool;
    quiz.lastIdx = -1;
    quiz.roundIndex = 0;
    quiz.score = 0;
    quiz.total = ctx.isPanel ? ctx.words.length : 20; // 面板测验题数 = 面板词数
    quiz.startTime = Date.now();
    quiz.awaitingAnswer = false;
    elQuizPanel.hidden = false;
    elQuizResultOverlay.classList.remove("open");
    updateQuizButtonVisibility();
    nextQuizRound();
  }

  function finishQuiz(){
    quiz.active = false;
    quiz.awaitingAnswer = false;
    elQuizPanel.hidden = true;
    var elapsed = Math.round((Date.now() - quiz.startTime) / 1000);
    elQuizScore.textContent = quiz.score + " / " + quiz.total;
    elQuizTime.textContent = (nativeLang === "en") ? (elapsed + " seconds") : ("用时 " + elapsed + " 秒");
    elQuizResultOverlay.classList.add("open");
    updateQuizButtonVisibility();
  }

  function cancelQuizSilently(){
    quiz.active = false;
    quiz.awaitingAnswer = false;
    elQuizPanel.hidden = true;
    elQuizResultOverlay.classList.remove("open");
    updateQuizButtonVisibility();
  }

  // ---------------------------------------------------------------
  // ⛶ 全屏切换（iPhone Safari 不支持网页元素全屏，API 缺失时按钮保持隐藏）
  // 按钮引用与文案刷新提到模块作用域，好让 applyChromeI18n 切母语时同步「全屏/退出全屏」
  // ---------------------------------------------------------------
  var elFullscreenBtn = document.getElementById("fullscreenBtn");
  function fsEl(){ return document.fullscreenElement || document.webkitFullscreenElement; }
  function syncFullscreenBtnText(){
    if(elFullscreenBtn){ elFullscreenBtn.textContent = fsEl() ? t("fullscreenExit") : t("fullscreenEnter"); }
  }
  (function(){
    var root = document.documentElement;
    var req = root.requestFullscreen || root.webkitRequestFullscreen;
    if(!elFullscreenBtn || !req){ return; }
    elFullscreenBtn.hidden = false;
    // 安卓：进全屏后顺便锁横屏；退出时解锁。所有 API 都 feature-detect + try/catch，
    // iOS Safari（无 screen.orientation.lock）或任何不支持的浏览器都静默忽略、绝不抛异常。
    function lockLandscape(){
      try {
        if(screen.orientation && typeof screen.orientation.lock === "function"){
          var r = screen.orientation.lock("landscape");
          if(r && typeof r.catch === "function"){ r.catch(function(){}); }
        }
      } catch(e){ /* 不支持则忽略 */ }
    }
    function unlockOrientation(){
      try {
        if(screen.orientation && typeof screen.orientation.unlock === "function"){
          screen.orientation.unlock();
        }
      } catch(e){ /* 不支持则忽略 */ }
    }
    elFullscreenBtn.addEventListener("click", function(){
      if(fsEl()){
        try { (document.exitFullscreen || document.webkitExitFullscreen).call(document); } catch(e){}
        unlockOrientation();
      } else {
        var p;
        try { p = req.call(root); } catch(e){ p = null; }
        if(p && typeof p.then === "function"){ p.then(lockLandscape, lockLandscape); }
        else { lockLandscape(); }
      }
    });
    document.addEventListener("fullscreenchange", syncFullscreenBtnText);
    document.addEventListener("webkitfullscreenchange", syncFullscreenBtnText);
  })();

  // 上滑→下一场景 / 下滑→上一场景；左滑→下一视角(平移) / 右滑→上一视角。
  // 点击 vs 滑动：位移 < 阈值当点击（放行热区选词）；> 阈值当滑动（触发导航并抑制那次 click）。
  // 只对非鼠标指针（触屏/笔）生效，桌面鼠标拖拽不劫持——桌面保留 ▲▼←→ 按钮。
  if(elExploreWrap){
    var SWIPE_MIN = 40; // px，小于此位移算点击
    var ptrActive = false, ptrId = null, ptrX = 0, ptrY = 0;
    var swipeSuppressClick = false;

    // 捕获阶段拦截：滑动结束后 synthesized click 会冒到热区，这里在到达热区前吃掉
    elExploreWrap.addEventListener("click", function(e){
      if(swipeSuppressClick){
        swipeSuppressClick = false;
        e.stopPropagation();
        e.preventDefault();
      }
    }, true);

    elExploreWrap.addEventListener("pointerdown", function(e){
      if(e.pointerType === "mouse"){ ptrActive = false; return; }
      ptrActive = true; ptrId = e.pointerId; ptrX = e.clientX; ptrY = e.clientY;
    });
    elExploreWrap.addEventListener("pointerup", function(e){
      if(!ptrActive || e.pointerId !== ptrId){ return; }
      ptrActive = false;
      var dx = e.clientX - ptrX, dy = e.clientY - ptrY;
      var adx = Math.abs(dx), ady = Math.abs(dy);
      if(Math.max(adx, ady) < SWIPE_MIN){ return; } // 小位移=点击，放行热区选词
      swipeSuppressClick = true;
      window.setTimeout(function(){ swipeSuppressClick = false; }, 400); // 兜底复位
      if(adx > ady){
        // 横向为主：左滑=下一视角(右平移,=btnRight)，右滑=上一视角(=btnLeft)；单视角场景内部自守空转
        if(dx < 0){ nextSlide(); } else { prevSlide(); }

        if(dy < 0){ nextScene(); } else { prevScene(); }
      }
    });
    elExploreWrap.addEventListener("pointercancel", function(){ ptrActive = false; });
  }

  (function(){

  function loadJSON(key){
    try{ return JSON.parse(window.localStorage.getItem(key)) || {}; }catch(e){ return {}; }
  }
  function saveJSON(key, obj){
    try{ window.localStorage.setItem(key, JSON.stringify(obj)); }catch(e){ /* 忽略存储失败，编辑仍在内存里生效 */ }
  }
  function clone(v){ return JSON.parse(JSON.stringify(v)); }

  var store = loadJSON(EDIT_KEY);

  // ---- 原始数据快照（"重置"用；必须在套用 localStorage 改动之前拍，且不管是否进编辑模式都要拍——
  // 快捷键随时能把 editMode 掰开，届时"原始"必须还在） ----
  var PRISTINE_HS = {};
  var PRISTINE_WORDS = {};
  slides.forEach(function(s){
    var key = s.sceneId + "::" + viewKey(s);
    PRISTINE_HS[key] = clone(s.hotspots || []);
    PRISTINE_WORDS[key] = clone(s.words || []);
    (s.panels || []).forEach(function(p){
      var pk = key + "::" + p.id;
      PRISTINE_HS[pk] = clone(p.hotspots || []);
      PRISTINE_WORDS[pk] = clone(p.words || []);
    });
  });
  var PRISTINE_MAPSPOTS = clone(mapSpots); // 地图热区同款原始快照，供"重置全部"用

  function targetFor(sceneId, view, panelId){
    var idx = findSceneViewIndex(sceneId, view);
    if(idx < 0) return null;
    var s = slides[idx];
    if(!panelId) return s;
    return findPanel(s, panelId) || null;
  }

  // ---- 把 localStorage 里存的改动套回内存 slides 数据：无条件跑，不看 editMode——
  // 这样"拖完切正常模式点验/刷新页面"才能看到改动；公开版 localStorage 里没有这个 key，等于空跑 ----
  (function applyStoredOverrides(){
    Object.keys(store).forEach(function(k){
      var rec = store[k];
      var target = targetFor(rec.sceneId, rec.view, rec.panel);
      if(!target) return;
      target.hotspots = clone(rec.hotspots);
      target.words = clone(rec.words);
    });
  })();

  function loadMapStore(){
    try{
      var raw = window.localStorage.getItem(MAP_EDIT_KEY);
      if(!raw) return null;
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : null;
    }catch(e){ return null; }
  }
  function saveMapStore(){
    try{ window.localStorage.setItem(MAP_EDIT_KEY, JSON.stringify(mapSpots)); }catch(e){ /* 存不了地图编辑仍在内存里生效 */ }
  }
  var mapHasEdits = false; // 是否曾经改过地图热区（决定导出时带不带 mapSpots 这个 change 条目）

  // ---- 同上，套地图热区的存档：按 sceneId 匹配（不依赖数组下标，改动 mapSpots 声明顺序也不会错位）----
  (function applyStoredMapOverrides(){
    var stored = loadMapStore();
    if(!stored) return;
    stored.forEach(function(rec){
      for(var i=0;i<mapSpots.length;i++){
        if(mapSpots[i].sceneId === rec.sceneId){
          mapSpots[i].x = rec.x; mapSpots[i].y = rec.y; // 坐标点只有 x/y，旧存档若带 wd/ht 直接忽略
          break;

      }
    });
    mapHasEdits = true;
  })();

  // 编辑模式开关
  // ---------------------------------------------------------------
  var editMode = /(^|[?&])edit=1(&|$)/.test(location.search);

  var uiBuilt = false;
  var elToolbar = null, elOverlay = null, elPropBody = null, elAddTypeRow = null;

  function ctxNow(){ return exploreCtx(); }

  function ctxMeta(ctx){
    var s = slides[current];
    return { sceneId: s.sceneId, view: viewKey(s), panel: ctx.isPanel ? activePanel.id : null };
  }

  function commitContext(ctx){
    var meta = ctxMeta(ctx);
    store[ctx.key] = { sceneId: meta.sceneId, view: meta.view, panel: meta.panel, hotspots: clone(ctx.hotspots), words: clone(ctx.words) };
    saveJSON(EDIT_KEY, store);
  }

  function resetContext(ctx){
    var meta = ctxMeta(ctx);
    var target = targetFor(meta.sceneId, meta.view, meta.panel);
    if(target){
      target.hotspots = clone(PRISTINE_HS[ctx.key] || []);
      target.words = clone(PRISTINE_WORDS[ctx.key] || []);
    }
    delete store[ctx.key];
    saveJSON(EDIT_KEY, store);
    selected = null;

  function resetAll(){
    if(!window.confirm("重置全部场景+地图的热区改动？此操作不可撤销（会清空本机存的所有热区编辑）。")) return;
    slides.forEach(function(s){
      var key = s.sceneId + "::" + viewKey(s);
      s.hotspots = clone(PRISTINE_HS[key] || []);
      s.words = clone(PRISTINE_WORDS[key] || []);
      (s.panels || []).forEach(function(p){
        var pk = key + "::" + p.id;
        p.hotspots = clone(PRISTINE_HS[pk] || []);
        p.words = clone(PRISTINE_WORDS[pk] || []);
      });
    });
    store = {};
    try{ window.localStorage.removeItem(EDIT_KEY); }catch(e){}
    mapSpots.forEach(function(s, i){
      var p = PRISTINE_MAPSPOTS[i];
      if(!p) return;
      s.x = p.x; s.y = p.y;
    });
    mapHasEdits = false;
    try{ window.localStorage.removeItem(MAP_EDIT_KEY); }catch(e){}

    mapSelected = null;

    flashMsg("已重置全部场景+地图");

  // 导出：把 store 里所有被改过的上下文，整理成 { changes:[{sceneId,view,panel,hotspots,words}] }，
  // 地图热区如果动过就再追加一条 { mapSpots:[...] }（全量快照，不是增量补丁——主循环烤回时直接
  // 整个替换 var mapSpots 数组最省事，每项自带 sceneId/zh 不会认错对象）。
  // 主循环 bake 回源码时：hotspots 直接整体替换该 scene/panel 的 hotspots 数组；
  // words 附带给，仅当新建过"单词"型热区时才会跟 hotspots 有出入（新词追加在数组末尾，
  // 其余场景/面板 words 数组通常和源码一致，照抄回去无副作用）。
  // ---------------------------------------------------------------
  function exportChanges(){
    var keys = Object.keys(store);
    if(!keys.length && !mapHasEdits){ flashMsg("还没有改动——先拖/加/删一个热区再导出"); return; }
    var changes = keys.map(function(k){
      var rec = store[k];
      return { sceneId: rec.sceneId, view: rec.view, panel: rec.panel || null, hotspots: clone(rec.hotspots), words: clone(rec.words) };
    });
    if(mapHasEdits){ changes.push({ mapSpots: clone(mapSpots) }); }
    var json = JSON.stringify({ changes: changes }, null, 2);
    copyToClipboard(json);
    downloadFile("热区改动.json", json);
    flashMsg("已导出 " + changes.length + " 处改动：剪贴板 + 热区改动.json");
  }

  function copyToClipboard(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(function(){ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text){
    try{
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }catch(e){ /* 复制失败没关系，下载的文件里还有 */ }
  }
  function downloadFile(filename, text){
    var blob = new Blob([text], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

      '.cj-eb-pin{position:absolute;width:22px;height:22px;margin-left:-11px;margin-top:-11px;border-radius:50%;border:2px dashed #7be08a;background:rgba(123,224,138,0.28);cursor:move;pointer-events:auto;box-sizing:border-box;}' +
      '.cj-eb-pin.cj-eb-sel{border-color:#ff5f5f;border-style:solid;background:rgba(255,95,95,0.32);z-index:2;}';
    document.head.appendChild(style);
  }

  // 折叠态存本地，刷新/重进编辑模式记得住上次开/合状态
  var TOOLBAR_COLLAPSE_KEY = "cj_edit_toolbar_collapsed_v1";

  function ensureUI(){
    if(uiBuilt) return;
    uiBuilt = true;
    buildToolbar();
  }

  function ensureOverlayEl(){
    if(!elOverlay){
      elOverlay = document.createElement("div");
      elOverlay.id = "cjEditOverlay";
    }
    if(elOverlay.parentNode !== elExploreStageInner){

    if(elOverlay) elOverlay.innerHTML = "";

  // ---------------------------------------------------------------
  // 热区框：渲染 + 拖拽/缩放
  // ---------------------------------------------------------------
  function typeOf(h){
    if(h.panel !== undefined) return "panel";
    if(h.portal !== undefined) return "portal";
    return "word";
  }
  function labelFor(ctx, h){
    var ty = typeOf(h);
    if(ty === "word"){
      var w = ctx.words[h.w];
      return w ? (wordTerm(w,"en") || "(空)") + " / " + (wordTerm(w,"zh") || "") : ("缺词 #" + h.w);
    }
    if(ty === "portal") return "→ " + h.portal + (h.view ? ("·" + h.view) : "");
    return "▤ " + h.panel;
  }
  function positionBox(box, h){
    box.style.left = h.x + "%";
    box.style.top = h.y + "%";
    box.style.width = h.wd + "%";
    box.style.height = h.ht + "%";
  }
  function roundHotspot(h){
    h.x = Math.round(h.x * 10) / 10;
    h.y = Math.round(h.y * 10) / 10;
    h.wd = Math.round(h.wd * 10) / 10;
    h.ht = Math.round(h.ht * 10) / 10;
  }
  function applyDelta(h, orig, mode, dx, dy){
    var x = orig.x, y = orig.y, wd = orig.wd, ht = orig.ht;
    if(mode === "move"){
      x = orig.x + dx; y = orig.y + dy;
    } else {
      if(mode.indexOf("e") !== -1){ wd = Math.max(MIN_SIZE, orig.wd + dx); }
      if(mode.indexOf("w") !== -1){ wd = Math.max(MIN_SIZE, orig.wd - dx); x = orig.x + orig.wd - wd; }
      if(mode.indexOf("s") !== -1){ ht = Math.max(MIN_SIZE, orig.ht + dy); }
      if(mode.indexOf("n") !== -1){ ht = Math.max(MIN_SIZE, orig.ht - dy); y = orig.y + orig.ht - ht; }
    }
    h.x = x; h.y = y; h.wd = wd; h.ht = ht;
  }
  function blurActive(){
    var a = document.activeElement;
    if(a && a !== document.body && a.blur){ a.blur(); }
  }
  function updateCoordInputsLive(h){
    if(h !== selected || !elPropBody) return;
    var inputs = elPropBody.querySelectorAll(".cj-et-grid input");
    var fields = ["x","y","wd","ht"];
    for(var i=0;i<inputs.length;i++){ inputs[i].value = Math.round(h[fields[i]] * 10) / 10; }
  }

  // startDrag 不再自己认定"完事了要 commitContext(ctx)"——原来写死只服务场景热区一种调用者，
  // 地图热区加进来后要写回的目标（mapSpots 数组）和收尾动作完全不同。改成拖拽/缩放的通用引擎：
  // 只认 (h, box, mode, refEl) 四件事（改哪个对象、改哪个框、往哪个方向、百分比相对谁的框量），
  // 移动中/松手后要做什么交给调用者传 handlers 回调，场景热区和地图热区各自传各自的收尾逻辑。
  function startDrag(e, h, box, mode, refEl, handlers){
    var rect = refEl.getBoundingClientRect();
    if(!rect.width || !rect.height) return;
    var startX = e.clientX, startY = e.clientY;
    var orig = { x:h.x, y:h.y, wd:h.wd, ht:h.ht };
    var pid = e.pointerId;
    function onMove(ev){
      if(ev.pointerId !== pid) return;
      var dx = (ev.clientX - startX) / rect.width * 100;
      var dy = (ev.clientY - startY) / rect.height * 100;
      applyDelta(h, orig, mode, dx, dy);
      positionBox(box, h);
      if(handlers.onMove) handlers.onMove(h);
    }
    function onUp(ev){
      if(ev.pointerId !== pid) return;
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      roundHotspot(h);
      positionBox(box, h);
      if(handlers.onCommit) handlers.onCommit(h);
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  }

  function sceneDragHandlers(ctx){
    return {
      onMove: updateCoordInputsLive,
      onCommit: function(){ commitContext(ctx); updatePropertyPanel(ctx); }
    };
  }

  function buildEditBox(ctx, h, idx){
    var box = document.createElement("div");
    box.className = "cj-eb cj-eb-" + typeOf(h) + (h === selected ? " cj-eb-sel" : "");
    box.setAttribute("data-idx", idx);
    positionBox(box, h);
    var tag = document.createElement("div");
    tag.className = "cj-eb-tag";
    tag.textContent = labelFor(ctx, h);
    box.appendChild(tag);

    box.addEventListener("pointerdown", function(e){
      blurActive();
      e.preventDefault();
      e.stopPropagation();
      if(selected !== h){
        selected = h;
        syncEditOverlay(ctx);
        var fresh = elOverlay.querySelector('[data-idx="' + idx + '"]');
        if(fresh) startDrag(e, h, fresh, "move", elExploreStageInner, sceneDragHandlers(ctx));
        return;
      }
      startDrag(e, h, box, "move", elExploreStageInner, sceneDragHandlers(ctx));
    });

    if(h === selected){
      HANDLE_DIRS.forEach(function(dir){
        var hd = document.createElement("div");
        hd.className = "cj-eb-h cj-eb-h-" + dir;
        hd.addEventListener("pointerdown", function(e){
          blurActive();
          e.preventDefault();
          e.stopPropagation();
          startDrag(e, h, box, dir, elExploreStageInner, sceneDragHandlers(ctx));
        });
        box.appendChild(hd);
      });
    }
    return box;
  }

  function syncEditOverlay(ctx){
    if(!editMode) return;
    ctx = ctx || ctxNow();
    ensureUI();
    var layer = ensureOverlayEl();
    layer.innerHTML = "";
    if(selected && ctx.hotspots.indexOf(selected) === -1){ selected = null; }
    ctx.hotspots.forEach(function(h, idx){
      layer.appendChild(buildEditBox(ctx, h, idx));
    });
    updatePropertyPanel(ctx);
    updateContextLabel(ctx);
    updateToolbarRowsForMode();
  }

  function updateContextLabel(ctx){
    var el = document.getElementById("cjEtCtx");
    if(!el) return;
    if(mapOpen) return; // 地图开着时这块文案归 updateMapContextLabel 管，别被场景那边覆盖掉
    if(!ctx){ el.textContent = "（当前场景没有舞台图，无法编辑）"; return; }
    var s = slides[current];
    var name = s.sceneNames.zh + (viewLabel(s) ? "·" + viewLabel(s) : "") + (ctx.isPanel ? "·" + ctx.name : "");
    el.textContent = "当前：" + name + "（" + ctx.hotspots.length + " 个热区）";
  }

  // 编辑模式下，"＋新增热区"和"重置本场景"这两块只对场景热区有意义（新增会往 ctxNow() 也就是
  // slides[current] 那个场景塞新热区/新词；地图没有"当前场景"概念）。地图打开时收起来，避免点了
  // 要么无效要么改错对象；"重置全部"/"导出改动"两个场景地图通用，一直留着。
  function updateToolbarRowsForMode(){
    if(!elToolbar) return;
    var addRow = document.getElementById("cjEtAddRow");
    var resetSceneBtn = document.getElementById("cjEtResetSceneBtn");
    if(addRow) addRow.hidden = mapOpen;
    if(resetSceneBtn) resetSceneBtn.hidden = mapOpen;
    if(mapOpen && elAddTypeRow) elAddTypeRow.hidden = true;
  }

  // ---------------------------------------------------------------
  // 地图热区编辑（目标从 ctx.hotspots 换成 mapSpots；mapSpots 全局唯一一份，没有"上下文"切换，
  // 逻辑比场景那边单薄很多：没有新增/删除，没有 word/portal/panel 类型分支，属性面板只出
  // sceneId+zh 只读 + x/y 两个数字框。2026-07-19 由区域框改坐标点：只拖位置，不再有 8 向缩放手柄，
  // 所以不复用通用的 startDrag/applyDelta/positionBox/roundHotspot（那套是给"框"设计的，
  // 认 wd/ht；mapSpots 已经没有这两个字段了）——另起一套只认 x/y 的点位拖拽引擎，
  // 场景热区那边的 startDrag 等函数完全不碰，行为原样保留）
  // ---------------------------------------------------------------
  var mapSelected = null;
  var elMapEditOverlay = null;
  var elMapStage = document.getElementById("mapStage");

  function ensureMapOverlayEl(){
    if(!elMapEditOverlay){
      elMapEditOverlay = document.createElement("div");
      elMapEditOverlay.id = "cjMapEditOverlay";
    }
    if(elMapEditOverlay.parentNode !== elMapStage){
      elMapStage.appendChild(elMapEditOverlay);
    }
    return elMapEditOverlay;
  }
  function clearMapOverlay(){
    if(elMapEditOverlay) elMapEditOverlay.innerHTML = "";
  }

  function commitMapChange(){
    mapHasEdits = true;
    saveMapStore();
  }

  // ---- 坐标点专用的定位/取整/拖拽：只认 x/y，跟场景热区那套 positionBox/roundHotspot/startDrag
  // （认 x/y/wd/ht）完全分开，互不影响 ----
  function positionMapEditBox(box, spot){
    box.style.left = spot.x + "%";
    box.style.top = spot.y + "%";
  }
  function roundMapSpot(spot){
    spot.x = Math.round(spot.x * 10) / 10;
    spot.y = Math.round(spot.y * 10) / 10;
  }
  function startMapPointDrag(e, spot, box, refEl, handlers){
    var rect = refEl.getBoundingClientRect();
    if(!rect.width || !rect.height) return;
    var startX = e.clientX, startY = e.clientY;
    var orig = { x: spot.x, y: spot.y };
    var pid = e.pointerId;
    function onMove(ev){
      if(ev.pointerId !== pid) return;
      var dx = (ev.clientX - startX) / rect.width * 100;
      var dy = (ev.clientY - startY) / rect.height * 100;
      spot.x = orig.x + dx;
      spot.y = orig.y + dy;
      positionMapEditBox(box, spot);
      if(handlers.onMove) handlers.onMove(spot);
    }
    function onUp(ev){
      if(ev.pointerId !== pid) return;
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      roundMapSpot(spot);
      positionMapEditBox(box, spot);
      if(handlers.onCommit) handlers.onCommit(spot);
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  }

  function updateMapCoordInputsLive(spot){
    if(spot !== mapSelected || !elPropBody) return;
    var inputs = elPropBody.querySelectorAll(".cj-et-grid input");
    var fields = ["x","y"];
    for(var i=0;i<inputs.length;i++){ inputs[i].value = Math.round(spot[fields[i]] * 10) / 10; }
  }

  function mapDragHandlers(){
    return {
      onMove: updateMapCoordInputsLive,
      onCommit: function(){ commitMapChange(); updateMapPropertyPanel(); }
    };
  }

  function buildMapEditBox(spot, idx){
    var box = document.createElement("div");
    box.className = "cj-eb-pin" + (spot === mapSelected ? " cj-eb-sel" : "");
    box.setAttribute("data-idx", idx);
    positionMapEditBox(box, spot);
    var tag = document.createElement("div");
    tag.className = "cj-eb-tag";
    tag.textContent = spot.zh + "（" + spot.sceneId + "）";
    box.appendChild(tag);

    // 只拖不缩：不再挂 HANDLE_DIRS 缩放手柄，pointerdown 一律走 move
    box.addEventListener("pointerdown", function(e){
      blurActive();
      e.preventDefault();
      e.stopPropagation();
      if(mapSelected !== spot){
        mapSelected = spot;
        syncMapEditOverlay();
        var fresh = elMapEditOverlay.querySelector('[data-idx="' + idx + '"]');
        if(fresh) startMapPointDrag(e, spot, fresh, elMapStage, mapDragHandlers());
        return;
      }
      startMapPointDrag(e, spot, box, elMapStage, mapDragHandlers());
    });

    return box;
  }

  function syncMapEditOverlay(){
    if(!editMode || !mapOpen) return;
    ensureUI();
    elMapHotspotLayer.style.display = "none"; // 藏起真实地图热区，编辑框接管手势，别让底下的点击跳场景
    var layer = ensureMapOverlayEl();
    layer.innerHTML = "";
    if(mapSelected && mapSpots.indexOf(mapSelected) === -1){ mapSelected = null; }
    mapSpots.forEach(function(spot, idx){
      layer.appendChild(buildMapEditBox(spot, idx));
    });
    updateMapPropertyPanel();
    updateMapContextLabel();
    updateToolbarRowsForMode();
  }

  function updateMapContextLabel(){
    var el = document.getElementById("cjEtCtx");
    if(!el) return;
    el.textContent = "当前：小镇地图（" + mapSpots.length + " 个建筑坐标点）";
  }

  function updateMapPropertyPanel(){
    if(!elPropBody) return;
    elPropBody.innerHTML = "";
    if(!mapSelected){
      var hint = document.createElement("div");
      hint.className = "cj-et-hint";
      hint.textContent = "点地图上的点选中一个建筑坐标点";
      elPropBody.appendChild(hint);
      return;
    }
    var spot = mapSelected;
    var head = document.createElement("div");
    head.className = "cj-et-prop-head";
    head.textContent = "地图坐标点：" + spot.zh + "（" + spot.sceneId + "）";
    elPropBody.appendChild(head);

    var grid = document.createElement("div");
    grid.className = "cj-et-grid";
    ["x","y"].forEach(function(field){
      var wrap = document.createElement("label");
      wrap.className = "cj-et-field";
      wrap.appendChild(document.createTextNode(field + " "));
      var input = document.createElement("input");
      input.type = "number";
      input.step = "0.1";
      input.value = spot[field];
      input.addEventListener("input", function(){
        var v = parseFloat(input.value);
        if(isNaN(v)) return;
        spot[field] = v;
        var boxEl = elMapEditOverlay.querySelector('[data-idx="' + mapSpots.indexOf(spot) + '"]');
        if(boxEl) positionMapEditBox(boxEl, spot);
      });
      input.addEventListener("change", function(){
        roundMapSpot(spot);
        input.value = spot[field];
        commitMapChange();
      });
      wrap.appendChild(input);
      grid.appendChild(wrap);
    });
    elPropBody.appendChild(grid);
    // 有意不给删除按钮：mapSpots 是固定建筑集合，删了 buildMapHotspots 就少一栋楼进不去，
    // 任务书没要求"新增/删除"，只要求"拖"，克制住不画蛇添足
  }

  // 地图开/关钩子：openMap/closeMap 有两种被调用的方式——elMapToggle/elMapQuickBtn/elMapClose
  // 是 addEventListener(openMap) 直接传函数引用（这几行在本模块跑之前就注册了，重新赋值 openMap/closeMap
  // 这几个引用已经定死，捕捉不到）；backdrop 点击、Esc 键、启动时兜底调用的 openMap() 都是在别处
  // 按名字现查现调（reassign 之后现查就能查到新的）。两条路都要接住：reassign 管住"按名字调"那几条，
  // 再在同一批按钮上各补一个监听器（注册顺序天然排在原生监听器后面，读到的都是原逻辑跑完之后的状态）
  // 管住"传引用"那几条。
  function afterMapOpenedInEditMode(){
    mapSelected = null;
    syncMapEditOverlay();
  }
  function afterMapClosedInEditMode(){
    mapSelected = null;
    clearMapOverlay();
    if(elMapHotspotLayer) elMapHotspotLayer.style.display = "";
    syncEditOverlay(ctxNow()); // 地图关掉，把场景那边的热区编辑框/属性面板/上下文文案刷新回来
  }
  var _origOpenMap = openMap;
  openMap = function(){
    _origOpenMap();
    if(editMode) afterMapOpenedInEditMode();
  };
  var _origCloseMap = closeMap;
  closeMap = function(){
    _origCloseMap();
    if(editMode) afterMapClosedInEditMode();
  };
  elMapToggle.addEventListener("click", function(){ if(editMode) afterMapOpenedInEditMode(); });
  elMapQuickBtn.addEventListener("click", function(){ if(editMode) afterMapOpenedInEditMode(); });
  elMapClose.addEventListener("click", function(){ if(editMode) afterMapClosedInEditMode(); });

  // ---------------------------------------------------------------
  // 右侧属性面板
  // ---------------------------------------------------------------
  function buildWordFieldsForm(ctx, w){
    var wrap = document.createElement("div");
    wrap.className = "cj-et-wordform";
    var fields = [
      ["terms","en","EN"], ["terms","zh","中文"],
      ["reading","en","音标"], ["reading","zh","拼音"],
      ["sen","en","例句 EN"], ["sen","zh","例句中文"],
      ["note","zh","备注"]
    ];
    fields.forEach(function(f){
      var group = f[0], lang = f[1], label = f[2];
      if(!w[group]) w[group] = {};
      var row = document.createElement("label");
      row.className = "cj-et-field cj-et-field-wide";
      row.textContent = label;
      var input = document.createElement("input");
      input.type = "text";
      input.value = w[group][lang] || "";
      input.addEventListener("change", function(){
        w[group][lang] = input.value;
        commitContext(ctx);
        syncEditOverlay(ctx);
      });
      row.appendChild(input);
      wrap.appendChild(row);
    });
    return wrap;
  }

  function buildWordTargetUI(ctx, h){
    var wrap = document.createElement("div");
    var label = document.createElement("div");
    label.className = "cj-et-sub";
    label.textContent = "改绑到已有词条：";
    var sel = document.createElement("select");
    sel.className = "cj-et-select";
    ctx.words.forEach(function(ww, i){
      var opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i + ": " + (wordTerm(ww,"en") || "(空)") + " / " + (wordTerm(ww,"zh") || "");
      if(i === h.w) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", function(){
      h.w = parseInt(sel.value, 10);
      commitContext(ctx);
      syncEditOverlay(ctx);
    });
    wrap.appendChild(label);
    wrap.appendChild(sel);
    var w = ctx.words[h.w];
    if(w){ wrap.appendChild(buildWordFieldsForm(ctx, w)); }
    return wrap;
  }

  function buildPortalTargetUI(ctx, h){
    var wrap = document.createElement("div");
    var sceneLabel = document.createElement("div");
    sceneLabel.className = "cj-et-sub";
    sceneLabel.textContent = "目标场景：";
    var sel = document.createElement("select");
    sel.className = "cj-et-select";
    sceneGroups.forEach(function(g){
      var sName = slides[g.firstIndex].sceneNames.zh;
      var opt = document.createElement("option");
      opt.value = g.sceneId;
      opt.textContent = sName + "（" + g.sceneId + "）";
      if(g.sceneId === h.portal) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", function(){
      h.portal = sel.value;
      commitContext(ctx);
      syncEditOverlay(ctx);
    });

    var viewLabelEl = document.createElement("div");
    viewLabelEl.className = "cj-et-sub";
    viewLabelEl.textContent = "目标视角（留空=默认）：";
    var viewInput = document.createElement("input");
    viewInput.type = "text";
    viewInput.className = "cj-et-select";
    viewInput.value = h.view || "";
    viewInput.placeholder = "如：大厅";
    viewInput.addEventListener("change", function(){
      if(viewInput.value.trim()){ h.view = viewInput.value.trim(); } else { delete h.view; }
      commitContext(ctx);
      syncEditOverlay(ctx);
    });

    wrap.appendChild(sceneLabel); wrap.appendChild(sel);
    wrap.appendChild(viewLabelEl); wrap.appendChild(viewInput);
    return wrap;
  }

  function buildPanelTargetUI(ctx, h){
    var wrap = document.createElement("div");
    var label = document.createElement("div");
    label.className = "cj-et-sub";
    label.textContent = "目标面板：";
    var s = slides[current];
    var panels = s.panels || [];
    var sel = document.createElement("select");
    sel.className = "cj-et-select";
    if(!panels.length){
      var opt0 = document.createElement("option");
      opt0.textContent = "（本场景没有已定义的面板）";
      sel.appendChild(opt0);
      sel.disabled = true;
    } else {
      panels.forEach(function(p){
        var opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = panelDisplayName(p) + "（" + p.id + "）";
        if(p.id === h.panel) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener("change", function(){
        h.panel = sel.value;
        commitContext(ctx);
        syncEditOverlay(ctx);
      });
    }
    wrap.appendChild(label);
    wrap.appendChild(sel);
    return wrap;
  }

  function updatePropertyPanel(ctx){
    if(!elPropBody) return;
    if(mapOpen) return; // 地图开着时属性面板归 updateMapPropertyPanel 管，别被场景这边的调用覆盖掉
    elPropBody.innerHTML = "";
    if(!ctx || !selected){
      var hint = document.createElement("div");
      hint.className = "cj-et-hint";
      hint.textContent = "点画面里的框选中，或点上面「＋新增热区」";
      elPropBody.appendChild(hint);
      return;
    }
    var h = selected;
    var ty = typeOf(h);

    var head = document.createElement("div");
    head.className = "cj-et-prop-head";
    head.textContent = "类型：" + TYPE_LABEL[ty];
    elPropBody.appendChild(head);

    var grid = document.createElement("div");
    grid.className = "cj-et-grid";
    ["x","y","wd","ht"].forEach(function(field){
      var wrap = document.createElement("label");
      wrap.className = "cj-et-field";
      wrap.appendChild(document.createTextNode(field + " "));
      var input = document.createElement("input");
      input.type = "number";
      input.step = "0.1";
      input.value = h[field];
      input.addEventListener("input", function(){
        var v = parseFloat(input.value);
        if(isNaN(v)) return;
        h[field] = v;
        var boxEl = elOverlay.querySelector('[data-idx="' + ctx.hotspots.indexOf(h) + '"]');
        if(boxEl) positionBox(boxEl, h);
      });
      input.addEventListener("change", function(){
        roundHotspot(h);
        input.value = h[field];
        commitContext(ctx);
      });
      wrap.appendChild(input);
      grid.appendChild(wrap);
    });
    elPropBody.appendChild(grid);

    var targetBox = document.createElement("div");
    if(ty === "word"){ targetBox.appendChild(buildWordTargetUI(ctx, h)); }
    else if(ty === "portal"){ targetBox.appendChild(buildPortalTargetUI(ctx, h)); }
    else if(ty === "panel"){ targetBox.appendChild(buildPanelTargetUI(ctx, h)); }
    elPropBody.appendChild(targetBox);

    var delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "cj-et-btn cj-et-btn-danger";
    delBtn.textContent = "删除此热区";
    delBtn.addEventListener("click", function(){ deleteSelected(); });
    elPropBody.appendChild(delBtn);
  }

  // ---------------------------------------------------------------
  // 新增 / 删除
  // ---------------------------------------------------------------
  function addHotspot(type){
    var s = slides[current];
    var target = activePanel || s;
    if(!target.hotspots) target.hotspots = [];
    if(!target.words) target.words = [];
    var ctx = ctxNow();
    var h = { x:35, y:35, wd:30, ht:30 };
    if(type === "word"){
      ctx.words.push({ terms:{en:"",zh:""}, reading:{en:"",zh:""}, sen:{en:"",zh:""}, note:{zh:""} });
      h.w = ctx.words.length - 1;
    } else if(type === "portal"){
      var candidate = sceneGroups[0];
      for(var gi=0; gi<sceneGroups.length; gi++){
        if(sceneGroups[gi].sceneId !== s.sceneId){ candidate = sceneGroups[gi]; break; }
      }
      h.portal = candidate ? candidate.sceneId : "";
    } else if(type === "panel"){
      h.panel = (s.panels && s.panels[0]) ? s.panels[0].id : "";
    }
    ctx.hotspots.push(h);
    commitContext(ctx);
    selected = h;
    syncEditOverlay(ctx);
  }

  function deleteSelected(){
    if(!selected) return;
    if(!window.confirm("删除这个热区？")) return;
    var ctx = ctxNow();
    var idx = ctx.hotspots.indexOf(selected);
    if(idx === -1) return;
    var removed = ctx.hotspots[idx];
    ctx.hotspots.splice(idx, 1);
    if(removed.w !== undefined){
      var w = ctx.words[removed.w];
      var isTrailing = (removed.w === ctx.words.length - 1);
      var stillUsed = ctx.hotspots.some(function(hh){ return hh.w === removed.w; });
      var isBlank = w && !wordTerm(w,"en").trim() && !wordTerm(w,"zh").trim();
      if(isTrailing && isBlank && !stillUsed){ ctx.words.pop(); }
    }
    commitContext(ctx);
    selected = null;
    syncEditOverlay(ctx);
  }

  // ---------------------------------------------------------------
  // 编辑模式总开关
  // ---------------------------------------------------------------
  function setEditMode(on){
    if(editMode === on) return;
    editMode = on;
    if(on){
      ensureUI();
      elToolbar.hidden = false;
      // 舞台图让出工具栏（270px+边距）占的右上角空间，见 injectStyle 里 .cj-edit-shrink 那条规则；
      // 只加类不直接写行内样式——具体收多少、怎么居左全交给 CSS，JS 这边只管开关
      elPage.classList.add("cj-edit-shrink");
      elHotspotLayer.style.display = "none";
      if(elQuizStart) elQuizStart.style.display = "none";
      // capture 阶段注册：宿主页面自己有一套 document 级 ArrowLeft/Right/Up/Down 场景导航监听（冒泡阶段），
      // 选中热区时方向键要归编辑器管——capture 先于 bubble 触发，onEditKeydown 里会对这类按键
      // stopPropagation，让事件走不到宿主那个冒泡监听器，两边就不会为同一次按键打架
      document.addEventListener("keydown", onEditKeydown, true);
      // 进编辑模式那一刻地图可能已经开着（比如先开地图看全镇，再按快捷键进编辑）——分流到对应的
      // 编辑框构建逻辑；地图没开就走原来场景热区那条路
      if(mapOpen) afterMapOpenedInEditMode();
      else syncEditOverlay(ctxNow());
    } else {
      selected = null;
      clearOverlay();
      mapSelected = null;
      clearMapOverlay();
      if(elMapHotspotLayer) elMapHotspotLayer.style.display = ""; // 保险：地图编辑覆盖层可能藏过真实地图热区，退出时还原
      if(elToolbar) elToolbar.hidden = true;
      elPage.classList.remove("cj-edit-shrink");
      elHotspotLayer.style.display = "";
      if(elQuizStart) elQuizStart.style.display = "";
      document.removeEventListener("keydown", onEditKeydown, true);
      renderExplore(); // 用最新数据刷一遍真实热区层，切回来就能直接点验
    }
  }

  function onEditKeydown(e){
    if(!editMode) return;
    var tag = document.activeElement && document.activeElement.tagName;
    if(tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    var isNavKey = (e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key === "ArrowUp" || e.key === "ArrowDown");
    // 地图坐标点：方向键只挪 x/y（没有 wd/ht 可缩，Shift 修饰符不区分），也没有删除键——
    // mapSpots 是固定建筑集合，跟场景热区那条分支各管各的，互不影响
    if(mapOpen){
      if(!mapSelected || !isNavKey) return;
      e.preventDefault();
      e.stopPropagation();
      if(e.key === "ArrowLeft"){ mapSelected.x -= NUDGE; }
      else if(e.key === "ArrowRight"){ mapSelected.x += NUDGE; }
      else if(e.key === "ArrowUp"){ mapSelected.y -= NUDGE; }
      else if(e.key === "ArrowDown"){ mapSelected.y += NUDGE; }
      roundMapSpot(mapSelected);
      commitMapChange();
      syncMapEditOverlay();
      return;
    }
    if(!selected) return;
    var isDeleteKey = (e.key === "Backspace" || e.key === "Delete");
    if(!isNavKey && !isDeleteKey) return;
    // 选中了热区，这个按键就是编辑器的——挡在 capture 阶段，不让宿主页面冒泡阶段的场景/视角切换监听器再收到它
    e.preventDefault();
    e.stopPropagation();
    if(isDeleteKey){ deleteSelected(); return; }
    if(e.key === "ArrowLeft"){ if(e.shiftKey){ selected.wd = Math.max(MIN_SIZE, selected.wd - NUDGE_BIG); } else { selected.x -= NUDGE; } }
    else if(e.key === "ArrowRight"){ if(e.shiftKey){ selected.wd = Math.max(MIN_SIZE, selected.wd + NUDGE_BIG); } else { selected.x += NUDGE; } }
    else if(e.key === "ArrowUp"){ if(e.shiftKey){ selected.ht = Math.max(MIN_SIZE, selected.ht - NUDGE_BIG); } else { selected.y -= NUDGE; } }
    else if(e.key === "ArrowDown"){ if(e.shiftKey){ selected.ht = Math.max(MIN_SIZE, selected.ht + NUDGE_BIG); } else { selected.y += NUDGE; } }
    var ctx = ctxNow();
    roundHotspot(selected);
    commitContext(ctx);
    syncEditOverlay(ctx);
  }

  // 唯一无条件常驻的监听：切换编辑模式的快捷键本身（公开版按了也只是拨一个内存开关，
  // 不落盘、不产生任何 DOM——真正的 UI/事件绑定都在 setEditMode(true) 分支里，只有触发了才会跑）
  document.addEventListener("keydown", function(e){
    var isShortcut = (e.key === "E" || e.key === "e") && e.shiftKey && (e.metaKey || e.ctrlKey);
    if(!isShortcut) return;
    e.preventDefault();
    setEditMode(!editMode);
  });

  // buildHotspots / showExplorePlaceholder 是真实热区层的两个渲染出口（同步路径 + 图片异步 onload 路径
  // 都会走 buildHotspots；无舞台图/面板空场景走 showExplorePlaceholder）。挂钩子而不是各处手动调用，
  // 保证编辑遮罩跟真实热区层任何时候都同步刷新，覆盖场景/面板/视角切换的所有路径。
  var _origBuildHotspots = buildHotspots;
  buildHotspots = function(ctx){
    _origBuildHotspots(ctx);
    if(editMode) syncEditOverlay(ctx);
  };
  var _origShowPlaceholder = showExplorePlaceholder;
  showExplorePlaceholder = function(kind){
    _origShowPlaceholder(kind);
    if(editMode){ selected = null; clearOverlay(); updatePropertyPanel(null); updateContextLabel(null); }
  };

  if(editMode){
    editMode = false; // 让 setEditMode(true) 走满整套初始化（建 UI/挂监听/画遮罩）而不是被"已是目标态"短路
    setEditMode(true);
  }
  })();

  // ---------------------------------------------------------------
  // 初始渲染
  // ---------------------------------------------------------------
  elPage.classList.add("mode-explore");
  applyChromeI18n();
  buildTocList();
  current = findSceneFirstIndex("exterior"); // 2026-07-19 落地页底层场景=房屋外观：放在 render() 之前，让场景横幅/箭头/目录高亮一次性对齐，避免关地图后出现卧室残留状态
  render();
  updateFooterText();
  openMap(); // 落地页=小镇地图：一开先看全镇，点建筑进场景（场景已在底层渲染，关地图即入场）

  if(isFirstVisit){
    // 首次访问：入场屏盖在地图之上，按 navigator.language 猜的默认语言先同步下拉选中态
    elEntryNativeSelect.value = nativeLang;
    elEntryLearnSelect.value = learnLang;
    elEntryOverlay.hidden = false;
  }

})();
</script>
